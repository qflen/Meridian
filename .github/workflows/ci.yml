name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -v -race -count=1 -timeout=120s

      - name: Go build
        run: go build -o bin/meridian ./cmd/meridian

  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        working-directory: dashboard

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: dashboard

      - name: Build
        run: npx vite build
        working-directory: dashboard

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [go, dashboard]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t meridian:ci .
